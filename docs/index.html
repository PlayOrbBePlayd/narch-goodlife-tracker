<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oakland GoodLife · NARCH 40 &amp; Over Tracker</title>
<link id="favicon" rel="icon" type="image/png">
<style>
  :root{
    /* GoodLife brand palette — forest green, orange, gold, cream */
    --bg:#0e1512; --panel:#15201b; --panel-2:#1d2a23; --line:#2c3d34;
    --text:#eef2ec; --muted:#9fb0a4;
    --brand:#124c33;        /* forest green */
    --brand-ink:#e7dbc4;    /* cream */
    --accent:#e0451f;       /* GoodLife orange */
    --gl:#f2a93b; --gl-deep:#7a5312; --gl-soft:rgba(242,169,59,.12); /* gold highlight */
    --win:#3ad07a; --live:#e0451f; --final:#7c86f7;
    --radius:16px; --shadow:0 6px 24px rgba(0,0,0,.40);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:light){
    :root{--bg:#f5f2ea;--panel:#ffffff;--panel-2:#faf7f0;--line:#e7e0d2;
      --text:#17231c;--muted:#5f6f62;--gl-soft:rgba(242,169,59,.18);--shadow:0 6px 22px rgba(20,40,25,.10);}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.45}
  a{color:inherit}
  .wrap{max-width:960px;margin:0 auto;padding:20px 16px 64px}

  header.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .logo{width:58px;height:58px;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))}
  .badge-narch{font-weight:800;letter-spacing:.5px;font-size:12px;color:var(--brand-ink);background:var(--brand);
    padding:4px 9px;border-radius:7px}
  h1{font-size:clamp(20px,4.4vw,30px);margin:0;font-weight:800;letter-spacing:-.3px}
  .sub{color:var(--muted);font-size:13px;margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .rhs{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
  .updated{text-align:right;font-size:12px;color:var(--muted)}
  .updated b{color:var(--text)}
  .refresh{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:12px;font-weight:700;
    color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:7px 14px;cursor:pointer;transition:background .15s,opacity .15s;box-shadow:var(--shadow)}
  .refresh:hover{background:var(--panel-2)}
  .refresh:disabled{opacity:.55;cursor:default}
  .refresh .ico{display:inline-block;font-size:14px;line-height:1;color:var(--accent)}
  .refresh.busy .ico{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--win);margin-right:5px;
    vertical-align:middle;box-shadow:0 0 0 0 rgba(58,208,122,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,208,122,.5)}70%{box-shadow:0 0 0 7px rgba(58,208,122,0)}100%{box-shadow:0 0 0 0 rgba(58,208,122,0)}}

  section{margin-top:22px}
  .sec-title{font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);
    margin:0 0 10px 2px;font-weight:700}

  /* GoodLife spotlight */
  .spot{background:linear-gradient(135deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-left:5px solid var(--gl);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 18px 16px;position:relative;overflow:hidden}
  .spot::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;
    background:radial-gradient(circle,var(--gl-soft),transparent 70%)}
  .spot::before{content:"";position:absolute;right:12px;bottom:-14px;width:132px;height:132px;
    background:var(--logo,none) right bottom/contain no-repeat;opacity:.12;pointer-events:none}
  .spot .eyebrow{color:var(--gl);font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase}
  .spot h2{margin:4px 0 2px;font-size:clamp(20px,5vw,28px);font-weight:800;position:relative}
  .spot .rankline{color:var(--muted);font-size:13px;position:relative}
  .statrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;position:relative}
  .stat{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 14px;min-width:70px;flex:1}
  .stat .n{font-size:22px;font-weight:800;line-height:1;white-space:nowrap}
  .stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
  .next{margin-top:14px;background:var(--bg);border:1px dashed var(--gl-deep);border-radius:12px;padding:12px 14px;position:relative}
  .next .lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gl);font-weight:700}
  .next .m{font-size:16px;font-weight:700;margin-top:3px}
  .next .when{color:var(--muted);font-size:13px;margin-top:2px}

  /* Standings */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
    text-align:center;padding:11px 6px;font-weight:700;background:var(--panel-2)}
  thead th.team,tbody td.team{text-align:left}
  tbody td{padding:11px 6px;text-align:center;border-top:1px solid var(--line);white-space:nowrap}
  tbody td.rk{color:var(--muted);width:26px}
  td.team{display:flex;align-items:center;gap:8px;padding-left:14px}
  td.team .full{font-weight:600}
  td.team .short{display:none}
  .pts{font-weight:800}
  tr.gl{background:var(--gl-soft)}
  tr.gl td{border-color:rgba(242,169,59,.28)}
  tr.gl td.team .full{color:var(--gl)}
  .glchip{font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--brand-ink);background:var(--brand);
    padding:2px 7px;border-radius:20px;text-transform:uppercase}

  /* Schedule */
  .day{margin-top:16px}
  .day h3{font-size:13px;color:var(--muted);margin:0 0 8px 2px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
  .game{display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .game.gl{border-color:var(--gl);background:linear-gradient(90deg,var(--gl-soft),transparent 60%)}
  .g-time{font-size:12px;color:var(--muted);text-align:center;line-height:1.25}
  .g-time .t{font-weight:700;color:var(--text);font-size:14px}
  .g-teams{min-width:0}
  .g-row{display:flex;align-items:center;gap:8px;padding:1px 0}
  .g-row .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .g-row.win .nm{color:var(--win)}
  .g-row.gl .nm{color:var(--gl);font-weight:800}
  .g-row .sc{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums;font-size:16px;min-width:22px;text-align:right}
  .g-status{justify-self:end;text-align:right}
  .pill{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    padding:3px 8px;border-radius:20px;white-space:nowrap}
  .pill.live{background:var(--live);color:#fff}
  .pill.final{background:rgba(124,134,247,.16);color:var(--final)}
  .pill.soon{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}
  .watch{display:block;margin-top:5px;font-size:11px;color:var(--live);font-weight:700;text-decoration:none}
  .facility{font-size:11px;color:var(--muted);margin-top:2px}

  footer{margin-top:34px;text-align:center;color:var(--muted);font-size:12px}
  footer a{color:var(--muted)}
  .err{background:rgba(224,69,31,.12);border:1px solid var(--accent);color:var(--text);
    padding:12px 14px;border-radius:12px;font-size:14px}
  @media (max-width:480px){
    .logo{width:48px;height:48px}
    td.team .full{display:none}
    td.team .short{display:inline;font-weight:600}
    .g-row .nm{font-size:14px}
  }
</style>
</head>

<div class="wrap">

    <img id="logo" class="logo" alt="Oakland GoodLife" onerror="this.remove()">
    <div>
      <h1>Oakland GoodLife</h1>

  <div id="app"></div>

  <footer>

</div>

const isGoodlife = (id,name) => id===GL_ID || (!!name && /goodlife/i.test(name));

function heEnt(s){
  return s.replace(/&quot;/g,'"').replace(/&#0*39;/g,"'").replace(/&apos;/g,"'")
          .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
          .replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(+n))
          .replace(/&amp;/g,'&');
}
async function apiLogin(){
  const r = await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({client_service_id:CSID})});
  if(!r.ok) throw new Error("login "+r.status);
  return (await r.json()).ticket.hash;
}
async function apiPartial(path,ticket){
  const sep = path.includes("?") ? "&" : "?";
  const r = await fetch(API+"/partials/stats/"+path+sep+"ticket="+ticket);
  if(!r.ok) throw new Error("partial "+r.status);
  return (await r.json()).content;
}
function parseGamesHtml(html){
  const un = heEnt(html), byId = {};
  for(const m of un.matchAll(/\{[^{}]*?"game_id":\d+[^{}]*\}/g)){
    try{ const o = JSON.parse(m[0]); byId[o.game_id] = o; }catch(e){}
  }
  const out = Object.values(byId).map(g=>({
    game_id:g.game_id,
    number:(""+(g.number??"")).replace(/\.0+$/,""),
    date:g.date, datetime:g.datetime, time:g.time, status:g.status||"",
    home_team:g.home_team, home_team_short:g.home_team_short, home_team_id:g.home_team_id, home_score:g.home_score,
    away_team:g.away_team, away_team_short:g.away_team_short, away_team_id:g.away_team_id, away_score:g.away_score,
    overtime:g.overtime, shootout:g.shootout, rink:g.rink, facility:g.facility, watch_live_url:g.watch_live_url
  }));
  out.sort((a,b)=>(a.datetime||"").localeCompare(b.datetime||"") || (""+a.number).localeCompare(""+b.number));
  return out;
}
function stripTags(s){ return heEnt(s.replace(/<[^>]+>/g,"")).trim(); }
function parseStandingsHtml(html){
  const tb = html.match(/<tbody>([\s\S]*?)<\/tbody>/); if(!tb) return [];
  const out = [];
  for(const rm of tb[1].matchAll(/<tr>([\s\S]*?)<\/tr>/g)){
    const cells = [...rm[1].matchAll(/<td[^>]*>([\s\S]*?)<\/td>/g)].map(m=>m[1]);
    if(cells.length < 9) continue;
    const tc = cells[1];
    const links = [...tc.matchAll(/<a[^>]*class="team-inline"[^>]*>([\s\S]*?)<\/a>/g)].map(m=>stripTags(m[1]));
    const full = links[0] || stripTags(tc), short = links[1] || full;
    const idm = tc.match(/\/team\/(\d+)/);
    const num = i => { const t = stripTags(cells[i]); const n = parseInt(t,10); return isNaN(n)?t:n; };
    out.push({rank:num(0), team:full, team_short:short, team_id: idm?+idm[1]:null,
      gp:num(2), w:num(3), l:num(4), t:num(5), pts:num(6), ga:num(7), gf:num(8)});
  }
  return out;
}
async function fetchLive(){
  const ticket = await apiLogin();
  const [sh,st] = await Promise.all([
    apiPartial("schedule/table?division_id="+DIV+"&all=1", ticket),
    apiPartial("standings/table?division_id="+DIV, ticket)
  ]);
  const games = parseGamesHtml(sh), standings = parseStandingsHtml(st);
  if(!games.length) throw new Error("no games parsed");
  let glName = null;
  standings.forEach(s=>{ s.is_goodlife = isGoodlife(s.team_id,s.team); if(s.is_goodlife) glName = s.team; });
  games.forEach(g=>{
    g.home_is_goodlife = isGoodlife(g.home_team_id,g.home_team);
    g.away_is_goodlife = isGoodlife(g.away_team_id,g.away_team);
    g.is_goodlife = g.home_is_goodlife || g.away_is_goodlife;
  });
  return {
    generated_at:new Date().toISOString(),
    division_id:DIV, division_name:"40 & Over",
    source_url:`https://www.narch.com/stats#/${LEAGUE}/schedule?division_id=${DIV}`,
    goodlife:{team_id:GL_ID, name: glName || "Oakland Goodlife - CA"},
    standings, games
  };
}

function relTime(iso){
  const then = new Date(iso).getTime();
  const s = Math.round((Date.now()-then)/1000);
  if (isNaN(s)) return "";
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60)+"m ago";
  if (s < 86400) return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}
function fmtDay(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
}
function fmtClock(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
}
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

const isFinal = s => /\bfinal\b|forfeit/i.test(s||"");
const notStarted = s => !s || /not started|scheduled|upcoming|postponed|cancel|delay/i.test(s);
// Anything with a status that isn't "final" and isn't "not started" is in progress.
const isLive  = s => !!(s||"").trim() && !isFinal(s) && !notStarted(s);

function statusPill(g){
  if (isLive(g.status))  return `<span class="pill live">● Live</span>`;
  if (isFinal(g.status)) return `<span class="pill final">Final${g.shootout?" · SO":g.overtime?" · OT":""}</span>`;
  return `<span class="pill soon">Upcoming</span>`;
}

function spotlight(d){
  const s = d.standings.find(t=>t.is_goodlife);
  const games = d.games.filter(g=>g.is_goodlife);
  const next = games.find(g => notStarted(g.status) || isLive(g.status));
  const rankTxt = s ? `#${s.rank} of ${d.standings.length} · ${d.division_name}` : d.division_name;
  const rec = s ? `${s.w}-${s.l}-${s.t}` : "—";
  let nextHtml = "";
  if(next){
    const opp = next.home_is_goodlife ? next.away_team : next.home_team;
    const homeAway = next.home_is_goodlife ? "vs" : "@";
    nextHtml = `<div class="next">
      <div class="lbl">${isLive(next.status)?"Playing now":"Next game"}</div>
      <div class="m">${homeAway} ${esc(opp)}</div>
      <div class="when">${esc(fmtDay(next.datetime))} · ${esc(fmtClock(next.datetime))}${next.rink?` · ${esc(next.rink)}`:""}${isLive(next.status)?` · <b style="color:var(--live)">${esc(next.status)}</b>`:""}</div>
    </div>`;
  } else {
    nextHtml = `<div class="next"><div class="lbl">Schedule</div><div class="m">Round robin complete</div></div>`;
  }
  return `<section>
    <div class="spot">
      <div class="eyebrow">★ GoodLife spotlight</div>
      <h2>${esc(s?s.team:"Oakland Goodlife - CA")}</h2>
      <div class="rankline">${esc(rankTxt)}</div>
      <div class="statrow">
        <div class="stat"><div class="n">${esc(rec)}</div><div class="k">W-L-T</div></div>
        <div class="stat"><div class="n">${s?s.pts:"—"}</div><div class="k">Points</div></div>
        <div class="stat"><div class="n">${s?s.gf:"—"}</div><div class="k">Goals For</div></div>
        <div class="stat"><div class="n">${s?s.ga:"—"}</div><div class="k">Goals Against</div></div>
      </div>
      ${nextHtml}
    </div>
  </section>`;
}

function standingsTable(d){
  const rows = d.standings.map(s=>`
    <tr class="${s.is_goodlife?"gl":""}">
      <td class="rk">${s.rank}</td>
      <td class="team">
        <span class="full">${esc(s.team)}</span>
        <span class="short">${esc(s.team_short)}</span>
        ${s.is_goodlife?'<span class="glchip">GoodLife</span>':""}
      </td>
      <td>${s.gp}</td><td>${s.w}</td><td>${s.l}</td><td>${s.t}</td>
      <td class="pts">${s.pts}</td><td>${s.gf}</td><td>${s.ga}</td>
    </tr>`).join("");
  return `<section>
    <p class="sec-title">Standings — Round Robin</p>
    <div class="card"><table>
      <thead><tr>
        <th></th><th class="team">Team</th><th>GP</th><th>W</th><th>L</th><th>T</th><th>Pts</th><th>GF</th><th>GA</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </section>`;
}

function teamRow(name, score, isWinner, isGL, hasScore){
  return `<div class="g-row ${isGL?"gl":""} ${isWinner?"win":""}">
    <span class="nm">${esc(name)}</span>
    ${hasScore?`<span class="sc">${score}</span>`:""}
  </div>`;
}

function schedule(d){
  const byDay = {};
  d.games.forEach(g=>{ (byDay[g.date] ||= []).push(g); });
  const days = Object.keys(byDay).sort();
  const blocks = days.map(day=>{
    const games = byDay[day].map(g=>{
      const done = isFinal(g.status), live = isLive(g.status);
      const hasScore = done || live;
      const hw = hasScore && g.home_score > g.away_score;
      const aw = hasScore && g.away_score > g.home_score;
      return `<div class="game ${g.is_goodlife?"gl":""}">
        <div class="g-time"><div class="t">${esc(fmtClock(g.datetime))}</div><div>#${esc(g.number)}</div></div>
        <div class="g-teams">
          ${teamRow(g.home_team_short, g.home_score, hw, g.home_is_goodlife, hasScore)}
          ${teamRow(g.away_team_short, g.away_score, aw, g.away_is_goodlife, hasScore)}
          ${g.rink||g.facility?`<div class="facility">${esc([g.rink,g.facility].filter(Boolean).join(" · "))}</div>`:""}
        </div>
        <div class="g-status">
          ${statusPill(g)}
          ${live&&g.watch_live_url?`<a class="watch" href="${esc(g.watch_live_url)}" target="_blank" rel="noopener">▶ Watch</a>`:""}
        </div>
      </div>`;
    }).join("");
    return `<div class="day"><h3>${esc(fmtDay(byDay[day][0].datetime))}</h3>${games}</div>`;
  }).join("");
  return `<section>
    <p class="sec-title">Schedule &amp; Results</p>
    ${blocks}
  </section>`;
}

// --- confetti on a GoodLife win --------------------------------------------
const CONFETTI = ["#124c33","#e0451f","#f2a93b","#e7dbc4","#ffffff"];
function fireConfetti(power){
  power = power || 1;
  if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const W = window.innerWidth || document.documentElement.clientWidth;
  const H = window.innerHeight || document.documentElement.clientHeight;
  if (!W || !H) return;   // no measurable viewport: nothing to draw on
  const cv = document.createElement("canvas");
  cv.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999";
  document.body.appendChild(cv);
  const ctx = cv.getContext("2d");
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = W * dpr; cv.height = H * dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  const parts = [];
  const n = Math.round(150 * power);
  for(let i=0;i<n;i++){
    parts.push({
      x: W * (0.5 + (Math.random()-0.5) * 0.7),
      y: -20 - Math.random() * H * 0.35,
      vx: (Math.random()-0.5) * 7,
      vy: 2 + Math.random() * 4,
      w: 6 + Math.random() * 6,
      h: 8 + Math.random() * 9,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random()-0.5) * 0.32,
      c: CONFETTI[(Math.random()*CONFETTI.length)|0]
    });
  }
  const DUR = 3400, start = performance.now();
  // Safety net: browsers throttle requestAnimationFrame in hidden/background tabs,
  // which would strand the canvas. This guarantees it is always removed.
  const failsafe = setTimeout(function(){ if(cv.parentNode) cv.remove(); }, DUR + 1500);
  function done(){ clearTimeout(failsafe); if(cv.parentNode) cv.remove(); }
  function frame(now){
    const t = now - start;
    ctx.clearRect(0,0,W,H);
    let alive = false;
    const fade = t > DUR - 900 ? Math.max(0, (DUR - t)/900) : 1;
    for(const p of parts){
      p.vy += 0.13; p.vx *= 0.995; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if(p.y < H + 40) alive = true;
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if(t < DUR && alive) requestAnimationFrame(frame); else done();
  }
  requestAnimationFrame(frame);
}

const CELEB_KEY = "gl_celebrated_wins";
function loadCelebrated(){
  try { return new Set(JSON.parse(localStorage.getItem(CELEB_KEY) || "[]")); }
  catch(e){ return new Set(); }
}
function saveCelebrated(set){
  try { localStorage.setItem(CELEB_KEY, JSON.stringify(Array.from(set))); } catch(e){}
}
function goodlifeWinIds(d){
  return d.games.filter(g=>{
    if(!g.is_goodlife || !isFinal(g.status)) return false;
    const gl  = g.home_is_goodlife ? g.home_score : g.away_score;
    const opp = g.home_is_goodlife ? g.away_score : g.home_score;
    return typeof gl === "number" && typeof opp === "number" && gl > opp;
  }).map(g=>g.game_id);
}
// Celebrates each win the first time this browser sees it (never twice).
function celebrateNewWins(d){
  const wins = goodlifeWinIds(d);
  if(!wins.length) return 0;
  // If the tab is hidden the animation can't run — leave the win uncelebrated
  // so the confetti fires when the fan actually comes back to the page.
  if(document.visibilityState !== "visible") return 0;
  const seen = loadCelebrated();
  const fresh = wins.filter(id => !seen.has(id));
  if(!fresh.length) return 0;
  fresh.forEach(id => seen.add(id));
  saveCelebrated(seen);
  fireConfetti(Math.min(1 + (fresh.length - 1) * 0.35, 2));
  return fresh.length;
}

// --- load / refresh --------------------------------------------------------
let busy = false;
async function load(){
  if(busy) return;
  busy = true;
  const btn = document.getElementById("refresh");
  if(btn){ btn.disabled = true; btn.classList.add("busy"); }
  let d = null, live = false;
  try{
    d = await fetchLive();          // real-time, straight from NARCH
    live = true;
  }catch(e){
    try{                            // fallback: last data committed by the 2-hour job
      const res = await fetch(FALLBACK_URL + "?t=" + Date.now(), {cache:"no-store"});
      if(res.ok) d = await res.json();
    }catch(_){}
  }
  if(d){
    document.getElementById("app").innerHTML = spotlight(d) + standingsTable(d) + schedule(d);
    const anyLive = d.games.some(g=>isLive(g.status));
    document.getElementById("updated").innerHTML =
      `${anyLive?'<span class="dot"></span>Games live · ':''}${live?"Live · ":"Cached · "}updated <b>${relTime(d.generated_at)}</b>`;
    const link = document.getElementById("srclink");
    if(d.source_url) link.href = d.source_url;
    celebrateNewWins(d);
  }else{
    document.getElementById("app").innerHTML =
      `<div class="err">Couldn't reach the scoreboard right now — tap <b>Refresh</b> to try again.</div>`;
  }
  if(btn){ btn.disabled = false; btn.classList.remove("busy"); }
  busy = false;
}

document.getElementById("refresh").addEventListener("click", load);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") load(); });
setInterval(()=>{ if(document.visibilityState==="visible") load(); }, 60000);
load();
</script>
